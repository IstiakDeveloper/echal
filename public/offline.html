<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#15803d" />
        <title>Offline — E‑Chal</title>
        <style>
            :root {
                color-scheme: light dark;
            }
            body {
                margin: 0;
                font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
                    Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
                background: #fff;
                color: #0f172a;
            }
            @media (prefers-color-scheme: dark) {
                body {
                    background: #0b1220;
                    color: #e2e8f0;
                }
            }
            .wrap {
                min-height: 100dvh;
                display: grid;
                place-items: center;
                padding: 24px;
            }
            .card {
                width: min(520px, 100%);
                border-radius: 16px;
                border: 1px solid rgba(148, 163, 184, 0.35);
                padding: 20px;
                background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(8px);
            }
            @media (prefers-color-scheme: dark) {
                .card {
                    background: rgba(2, 6, 23, 0.45);
                    border-color: rgba(148, 163, 184, 0.22);
                }
            }
            h1 {
                margin: 0 0 8px;
                font-size: 20px;
            }
            p {
                margin: 0 0 16px;
                line-height: 1.45;
                color: rgba(100, 116, 139, 1);
            }
            @media (prefers-color-scheme: dark) {
                p {
                    color: rgba(148, 163, 184, 1);
                }
            }
            .actions {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }
            a,
            button {
                appearance: none;
                border: 0;
                border-radius: 12px;
                padding: 10px 12px;
                font-weight: 600;
                cursor: pointer;
                text-decoration: none;
            }
            a {
                background: #15803d;
                color: #fff;
            }
            button {
                background: rgba(148, 163, 184, 0.22);
                color: inherit;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <div class="card">
                <h1>You’re offline</h1>
                <p>
                    Please check your internet connection. You can retry now, or
                    go back to the home page.
                </p>
                <div class="actions">
                    <button type="button" onclick="location.reload()">
                        Retry
                    </button>
                    <a href="/">Go to home</a>
                </div>
            </div>
        </div>
    </body>
</html>
